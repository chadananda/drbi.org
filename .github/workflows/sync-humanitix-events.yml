# Scheduled Humanitix → D1 event sync. Pings the secured sync endpoint on the live Worker.
# Read-only: the endpoint never publishes (events land as DRAFT; humans own publish).
# Requires repo secret CRON_SECRET (must match the CRON_SECRET Worker secret).
# The endpoint returns 503 until HUMANITIX_API_KEY is set as a Worker secret.
name: Sync Humanitix events

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours, offset off the hour
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT: https://drbi.org/api/cron/sync-events
        run: |
          echo "Triggering $ENDPOINT"
          # Content-Type: application/json is required — Astro's CSRF guard rejects
          # form-like POSTs (403) but allows JSON (not a browser-forgeable content type).
          body=$(curl -fsS -X POST "$ENDPOINT" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -w "\n%{http_code}")
          code=$(echo "$body" | tail -n1)
          echo "$body" | sed '$d'
          echo "HTTP $code"
          # 200 = synced, 503 = not yet configured (HUMANITIX_API_KEY missing) — both are non-fatal
          if [ "$code" != "200" ] && [ "$code" != "503" ]; then exit 1; fi
